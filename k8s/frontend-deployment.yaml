apiVersion: apps/v1
kind: Deployment
metadata:
  name: esf-frontend
  namespace: esf
spec:
  replicas: 2
  selector:
    matchLabels:
      app: esf-frontend
  template:
    metadata:
      labels:
        app: esf-frontend
    spec:
      containers:
        - name: frontend
          image: your-registry/esf-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: esf-frontend
  namespace: esf
spec:
  selector:
    app: esf-frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000

