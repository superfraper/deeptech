apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: esf-frontend
  namespace: esf
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  tls:
    - hosts:
        - app.example.com
      secretName: esf-tls
  rules:
    - host: app.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: esf-frontend
                port:
                  number: 3000

