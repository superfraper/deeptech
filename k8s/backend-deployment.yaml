apiVersion: apps/v1
kind: Deployment
metadata:
  name: esf-backend
  namespace: esf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: esf-backend
  template:
    metadata:
      labels:
        app: esf-backend
    spec:
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
      containers:
        - name: backend
          image: your-registry/esf-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: esf-secrets
            - configMapRef:
                name: esf-config
          volumeMounts:
            - name: db-data
              mountPath: /app/data/databases
            - name: logs
              mountPath: /app/logs
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 15
            timeoutSeconds: 5
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: esf-backend-data-pvc
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: esf-backend
  namespace: esf
spec:
  selector:
    app: esf-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000

