paths:
  /api/upload/abort/{filename}:
    delete:
      summary: Abort File Upload
      description: Endpoint to abort file upload/processing. Client-side cleanup only.
      security:
        - HTTPBearer: []
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful Response
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/generation/{generation_id}/cancel:
